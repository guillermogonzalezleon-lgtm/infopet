<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Carga masiva — InfoPet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/style.css"/>
<style>
.page-wrap { max-width: 1200px; margin: 0 auto; padding: 80px 24px 48px; }
.page-header { margin-bottom: 32px; }
.page-header h1 { font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 700; color: var(--text, #1D1D1F); margin-bottom: 6px; }
.page-header p { font-size: 15px; color: var(--text-muted, #6E6E73); }

/* Drop zone */
.drop-zone {
  border: 2px dashed var(--border, #E5E3DA); border-radius: var(--radius, 16px);
  padding: 64px 24px; text-align: center;
  background: var(--surface, rgba(255,255,255,0.80));
  transition: all 0.2s ease; cursor: pointer; margin-bottom: 28px;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent, #2D6A4F); background: rgba(45,106,79,0.04);
}
.drop-zone .drop-icon { font-size: 48px; color: var(--text-muted, #6E6E73); margin-bottom: 16px; line-height: 1; }
.drop-zone .drop-text { font-size: 15px; color: var(--text, #1D1D1F); font-weight: 500; margin-bottom: 6px; }
.drop-zone .drop-hint { font-size: 13px; color: var(--text-muted, #6E6E73); }
.drop-zone input[type="file"] { display: none; }

/* Summary pills */
.summary-pills { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 18px; border-radius: 100px; font-size: 14px; font-weight: 600;
  font-family: 'Inter', sans-serif;
}
.pill-green { background: rgba(45,106,79,0.1); color: var(--green, #2D6A4F); }
.pill-amber { background: rgba(155,107,10,0.1); color: #9B6B0A; }
.pill-red { background: rgba(192,57,43,0.1); color: var(--red, #C0392B); }

/* Filter pills */
.filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-pill {
  padding: 7px 18px; border: 1px solid var(--border, #E5E3DA); border-radius: 100px;
  background: var(--surface, rgba(255,255,255,0.80)); color: var(--text-muted, #6E6E73);
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s ease;
  font-family: 'Inter', sans-serif;
}
.filter-pill:hover { border-color: var(--accent, #2D6A4F); color: var(--accent, #2D6A4F); }
.filter-pill.active { background: var(--accent, #2D6A4F); color: #fff; border-color: var(--accent, #2D6A4F); }

/* Status pills in table */
.status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 12px; border-radius: 100px; font-size: 12px; font-weight: 600;
}
.status-pill.s-ok { background: rgba(45,106,79,0.1); color: var(--green, #2D6A4F); }
.status-pill.s-warning { background: rgba(155,107,10,0.1); color: #9B6B0A; }
.status-pill.s-error { background: rgba(192,57,43,0.1); color: var(--red, #C0392B); }

/* Table */
.table-section { margin-bottom: 24px; }

/* Export bar */
.export-bar {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding: 16px 20px; background: var(--surface, rgba(255,255,255,0.80));
  border: 1px solid var(--border, #E5E3DA); border-radius: var(--radius, 16px);
}
.export-bar .export-info { font-size: 13px; color: var(--text-muted, #6E6E73); margin-left: auto; }

/* Alert */
#alert { margin-bottom: 16px; }

/* Hidden */
.hidden { display: none !important; }

@media (max-width: 768px) {
  .page-wrap { padding: 70px 12px 32px; }
  .summary-pills { flex-direction: column; }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <img src="assets/logo.jpeg" alt="InfoPet"/>
    <span>InfoPet</span>
    <span class="badge">panel</span>
  </a>
  <div class="navbar-links">
    <a href="index.html">Inicio</a>
    <a href="carga-producto.html">Carga</a>
    <a href="facturas.html">Facturas</a>
    <a href="stock-dashboard.html">Stock</a>
    <a href="jumpseller-bulk.html" class="active">Bulk</a>
    <a href="sync-stock.html">Sync</a>
  </div>
</nav>

<main class="page-wrap">
  <div class="page-header">
    <h1>Carga masiva</h1>
    <p>Sube tu Carga Maestra CSV &rarr; genera CSV Jumpseller</p>
  </div>

  <div id="alert" class="alert"></div>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">&uarr;</div>
    <div class="drop-text">Arrastra tu CSV aqu&iacute; o haz clic para seleccionar</div>
    <div class="drop-hint">Carga Maestra desde Google Sheets (.csv)</div>
    <input type="file" id="fileInput" accept=".csv"/>
  </div>

  <!-- Results section -->
  <div id="resultsSection" class="hidden">
    <!-- Summary pills -->
    <div class="summary-pills">
      <span class="pill pill-green"><span id="countOk">0</span> OK</span>
      <span class="pill pill-amber"><span id="countWarn">0</span> Warnings</span>
      <span class="pill pill-red"><span id="countErr">0</span> Errores</span>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <button class="filter-pill active" data-filter="all" onclick="setFilter('all', this)">Todos</button>
      <button class="filter-pill" data-filter="ok" onclick="setFilter('ok', this)">OK</button>
      <button class="filter-pill" data-filter="warning" onclick="setFilter('warning', this)">Warning</button>
      <button class="filter-pill" data-filter="error" onclick="setFilter('error', this)">Error</button>
    </div>

    <!-- Table -->
    <div class="table-section">
      <div class="card" style="padding:0;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Estado</th>
                <th>Nombre</th>
                <th>SKU</th>
                <th>Precio</th>
                <th>Categor&iacute;a</th>
                <th>Marca</th>
                <th>C&oacute;digo Barra</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Export bar -->
    <div class="export-bar">
      <button class="btn btn-primary" id="btnExport" onclick="exportCSV()">Exportar CSV Jumpseller</button>
      <span class="export-info" id="exportInfo"></span>
    </div>
  </div>
</main>

<script src="auth.js"></script>
<script src="assets/utils.js"></script>
<script>
(function() {
  var rows = [];
  var currentFilter = 'all';
  var alertEl = document.getElementById('alert');
  var tbody = document.getElementById('tbody');
  var dropZone = document.getElementById('dropZone');
  var fileInput = document.getElementById('fileInput');
  var resultsSection = document.getElementById('resultsSection');

  // Drop zone events
  dropZone.addEventListener('click', function() { fileInput.click(); });
  dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', function() {
    if (fileInput.files.length > 0) processFile(fileInput.files[0]);
  });

  function processFile(file) {
    if (!file.name.endsWith('.csv')) {
      showAlert(alertEl, 'err', 'Solo se aceptan archivos CSV.');
      return;
    }
    var reader = new FileReader();
    reader.onload = function(e) { parseCSV(e.target.result); };
    reader.readAsText(file, 'UTF-8');
  }

  function parseCSV(text) {
    var lines = text.split(/\r?\n/).filter(function(l) { return l.trim().length > 0; });
    if (lines.length < 2) {
      showAlert(alertEl, 'err', 'El CSV est\u00e1 vac\u00edo o solo tiene encabezado.');
      return;
    }

    var headers = splitCSVLine(lines[0]).map(function(h) { return h.trim().toLowerCase(); });

    var colMap = {
      name: findCol(headers, ['nombre', 'name', 'producto', 'descripcion', 'descripci\u00f3n']),
      sku: findCol(headers, ['sku', 'codigo', 'c\u00f3digo', 'code']),
      price: findCol(headers, ['precio', 'price', 'valor']),
      category: findCol(headers, ['categoria', 'categor\u00eda', 'category', 'categories']),
      brand: findCol(headers, ['marca', 'brand']),
      barcode: findCol(headers, ['codigo barra', 'c\u00f3digo barra', 'barcode', 'ean', 'upc', 'codigo_barra']),
      stock: findCol(headers, ['stock', 'cantidad', 'quantity']),
      description: findCol(headers, ['descripcion', 'descripci\u00f3n', 'description', 'detalle'])
    };

    rows = [];
    var skus = {};

    for (var i = 1; i < lines.length; i++) {
      var cols = splitCSVLine(lines[i]);
      var row = {
        name: getVal(cols, colMap.name),
        sku: getVal(cols, colMap.sku),
        price: getVal(cols, colMap.price),
        category: getVal(cols, colMap.category),
        brand: getVal(cols, colMap.brand),
        barcode: getVal(cols, colMap.barcode),
        stock: getVal(cols, colMap.stock) || '0',
        description: getVal(cols, colMap.description),
        status: 'ok',
        issues: []
      };

      // Validate
      if (!row.name) { row.status = 'error'; row.issues.push('Falta nombre'); }
      if (!row.price) { row.status = 'error'; row.issues.push('Falta precio'); }
      if (row.sku && skus[row.sku]) {
        if (row.status !== 'error') row.status = 'warning';
        row.issues.push('SKU duplicado');
      }
      if (!row.barcode && row.status !== 'error') {
        if (row.status !== 'error') row.status = 'warning';
        row.issues.push('C\u00f3digo barra vac\u00edo');
      }
      if (row.sku) skus[row.sku] = true;

      rows.push(row);
    }

    resultsSection.classList.remove('hidden');
    dropZone.style.display = 'none';
    renderCounters();
    renderTable();
    showAlert(alertEl, 'ok', rows.length + ' productos cargados desde CSV.');
  }

  function findCol(headers, aliases) {
    for (var a = 0; a < aliases.length; a++) {
      for (var h = 0; h < headers.length; h++) {
        if (headers[h] === aliases[a] || headers[h].indexOf(aliases[a]) !== -1) return h;
      }
    }
    return -1;
  }

  function getVal(cols, idx) {
    if (idx < 0 || idx >= cols.length) return '';
    return (cols[idx] || '').trim();
  }

  function splitCSVLine(line) {
    var result = [];
    var current = '';
    var inQuotes = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { current += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',' || ch === ';') { result.push(current); current = ''; }
        else { current += ch; }
      }
    }
    result.push(current);
    return result;
  }

  function renderCounters() {
    var ok = 0, warn = 0, err = 0;
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].status === 'ok') ok++;
      else if (rows[i].status === 'warning') warn++;
      else err++;
    }
    document.getElementById('countOk').textContent = ok;
    document.getElementById('countWarn').textContent = warn;
    document.getElementById('countErr').textContent = err;
    document.getElementById('exportInfo').textContent = (ok + warn) + ' productos listos para exportar';
  }

  function getStatusPill(status) {
    if (status === 'error') return '<span class="status-pill s-error">Error</span>';
    if (status === 'warning') return '<span class="status-pill s-warning">Warning</span>';
    return '<span class="status-pill s-ok">OK</span>';
  }

  function renderTable() {
    tbody.innerHTML = '';
    var filtered = rows.filter(function(r) {
      if (currentFilter === 'all') return true;
      return r.status === currentFilter;
    });

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">Sin resultados para este filtro.</td></tr>';
      return;
    }

    for (var i = 0; i < filtered.length; i++) {
      var r = filtered[i];
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + getStatusPill(r.status) + '</td>' +
        '<td>' + escHtml(r.name) + (r.issues.length > 0 ? ' <small style="color:var(--text-muted)">(' + escHtml(r.issues.join(', ')) + ')</small>' : '') + '</td>' +
        '<td><code>' + escHtml(r.sku) + '</code></td>' +
        '<td>' + escHtml(r.price) + '</td>' +
        '<td>' + escHtml(r.category) + '</td>' +
        '<td>' + escHtml(r.brand) + '</td>' +
        '<td>' + escHtml(r.barcode) + '</td>';
      tbody.appendChild(tr);
    }
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Filter
  window.setFilter = function(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-pill').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderTable();
  };

  // Export CSV Jumpseller
  window.exportCSV = function() {
    var exportRows = rows.filter(function(r) { return r.status === 'ok' || r.status === 'warning'; });
    if (exportRows.length === 0) {
      showAlert(alertEl, 'warn', 'No hay productos v\u00e1lidos para exportar. Corrige los errores primero.');
      return;
    }

    var headers = ['Name', 'SKU', 'Categories', 'Price', 'Stock', 'Description', 'Brand', 'Barcode', 'Status'];
    var csvRows = exportRows.map(function(r) {
      return [
        csvCell(r.name), csvCell(r.sku), csvCell(r.category),
        csvCell(r.price), csvCell(r.stock), csvCell(r.description),
        csvCell(r.brand), csvCell(r.barcode), csvCell('active')
      ].join(',');
    });

    var csv = '\uFEFF' + headers.join(',') + '\n' + csvRows.join('\n');
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var fecha = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = 'jumpseller_import_' + fecha + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    showAlert(alertEl, 'ok', 'CSV Jumpseller exportado con ' + exportRows.length + ' productos.');
  };

  function csvCell(val) {
    var s = String(val || '');
    if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }
})();
</script>
</body>
</html>
