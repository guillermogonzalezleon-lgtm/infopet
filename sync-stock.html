<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sincronizaci&oacute;n — InfoPet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/style.css"/>
<style>
.page-wrap { max-width: 1200px; margin: 0 auto; padding: 80px 24px 48px; }
.page-header { margin-bottom: 32px; }
.page-header h1 { font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 700; color: var(--text, #1D1D1F); margin-bottom: 6px; }
.page-header p { font-size: 15px; color: var(--text-muted, #6E6E73); }

/* Top bar */
.top-bar {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 24px; padding: 14px 20px;
  background: var(--surface, rgba(255,255,255,0.80)); border: 1px solid var(--border, #E5E3DA);
  border-radius: var(--radius, 16px);
}
.top-bar .last-update { font-size: 13px; color: var(--text-muted, #6E6E73); margin-right: auto; }
.top-bar .last-update strong { color: var(--text, #1D1D1F); font-weight: 600; }

/* Summary cards */
.summary-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px;
}
.summary-card {
  background: var(--surface, rgba(255,255,255,0.80)); border: 1px solid var(--border, #E5E3DA);
  border-radius: var(--radius, 16px); padding: 22px 24px; text-align: center;
  transition: all 0.2s ease;
}
.summary-card:hover { border-color: var(--border-hover, #D0CEC4); box-shadow: 0 8px 32px rgba(0,0,0,0.06); }
.summary-card .card-label {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 12px; font-weight: 600; color: var(--text-muted, #6E6E73);
  text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px;
}
.summary-card .card-value { font-family: 'Inter', sans-serif; font-size: 36px; font-weight: 700; }
.summary-card.card-green .card-value { color: var(--green, #2D6A4F); }
.summary-card.card-red .card-value { color: var(--red, #C0392B); }

/* Dot indicators */
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot-red { background: var(--red, #C0392B); }
.dot-amber { background: #D4A843; }
.dot-green { background: var(--green, #2D6A4F); }
.dot-pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Table */
.table-section { margin-bottom: 24px; }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: var(--radius-sm, 10px); }
.diff-pos { color: var(--green, #2D6A4F); font-weight: 600; }
.diff-neg { color: var(--red, #C0392B); font-weight: 600; }
.diff-zero { color: var(--text-muted, #6E6E73); }

/* Sync all bar */
.sync-bar {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding: 16px 20px; background: var(--surface, rgba(255,255,255,0.80));
  border: 1px solid var(--border, #E5E3DA); border-radius: var(--radius, 16px);
}
.sync-bar .sync-status { font-size: 13px; color: var(--text-muted, #6E6E73); margin-left: auto; }

/* Alert */
#alert { margin-bottom: 16px; }

/* Empty state */
.empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted, #6E6E73); font-size: 14px; }

@media (max-width: 860px) {
  .page-wrap { padding: 70px 12px 32px; }
  .summary-grid { grid-template-columns: 1fr; }
  .top-bar { flex-direction: column; align-items: stretch; }
  .top-bar .last-update { margin-right: 0; margin-bottom: 8px; }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <img src="assets/logo.jpeg" alt="InfoPet"/>
    <span>InfoPet</span>
    <span class="badge">panel</span>
  </a>
  <div class="navbar-links">
    <a href="index.html">Inicio</a>
    <a href="carga-producto.html">Carga</a>
    <a href="facturas.html">Facturas</a>
    <a href="stock-dashboard.html">Stock</a>
    <a href="jumpseller-bulk.html">Bulk</a>
    <a href="sync-stock.html" class="active">Sync</a>
  </div>
</nav>

<main class="page-wrap">
  <div class="page-header">
    <h1>Sincronizaci&oacute;n</h1>
    <p>Comparador Bsale &harr; Jumpseller en tiempo real</p>
  </div>

  <div id="alert" class="alert"></div>

  <!-- Top bar -->
  <div class="top-bar">
    <span class="last-update">&Uacute;ltima actualizaci&oacute;n: <strong id="lastUpdate">--</strong></span>
    <button class="btn btn-primary" id="btnCompare" onclick="loadComparison()">Comparar ahora</button>
    <button class="btn btn-secondary" id="btnEmail" onclick="sendAlert()">Enviar alerta email</button>
  </div>

  <!-- Summary cards -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="card-label">Total</div>
      <div class="card-value" id="totalCount">--</div>
    </div>
    <div class="summary-card card-green">
      <div class="card-label"><span class="dot dot-green"></span> Sincronizados</div>
      <div class="card-value" id="syncedCount">--</div>
    </div>
    <div class="summary-card card-red">
      <div class="card-label"><span class="dot dot-red"></span> Con diferencia</div>
      <div class="card-value" id="diffCount">--</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-section">
    <div class="card" style="padding:0;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Producto</th>
              <th>SKU</th>
              <th>Stock Bsale</th>
              <th>Stock Jumpseller</th>
              <th>Diferencia</th>
              <th>Estado</th>
              <th>Acci&oacute;n</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="empty-state" id="emptyState">Cargando datos de comparaci&oacute;n...</div>
  </div>

  <!-- Sync all bar -->
  <div class="sync-bar">
    <button class="btn btn-primary" id="btnSyncAll" onclick="syncAll()" disabled>Sincronizar todo</button>
    <span class="sync-status" id="syncStatus"></span>
  </div>
</main>

<script src="auth.js"></script>
<script src="assets/utils.js"></script>
<script>
(function() {
  var comparisonData = [];
  var lastUpdateTime = null;
  var alertEl = document.getElementById('alert');
  var tbody = document.getElementById('tbody');
  var emptyState = document.getElementById('emptyState');

  // Update timestamp display
  function updateTimestamp() {
    var el = document.getElementById('lastUpdate');
    if (!lastUpdateTime) { el.textContent = '--'; return; }
    var mins = Math.round((Date.now() - lastUpdateTime) / 60000);
    if (mins < 1) { el.textContent = 'ahora'; return; }
    if (mins < 60) { el.textContent = 'hace ' + mins + ' min'; return; }
    var h = Math.floor(mins / 60);
    el.textContent = 'hace ' + h + 'h ' + (mins % 60) + 'min';
  }
  setInterval(updateTimestamp, 30000);

  // Load comparison
  window.loadComparison = async function() {
    var btn = document.getElementById('btnCompare');
    btn.disabled = true;
    btn.textContent = 'Cargando...';
    emptyState.textContent = 'Cargando datos de comparaci\u00f3n...';
    emptyState.style.display = 'block';
    tbody.innerHTML = '';

    try {
      var data = await apiFetch('/api/sync?action=compare');
      comparisonData = data.items || data || [];
      lastUpdateTime = Date.now();
      updateTimestamp();
      renderTable();
      renderSummary();
    } catch (err) {
      showAlert(alertEl, 'err', 'Error al cargar comparaci\u00f3n: ' + err.message);
      emptyState.textContent = 'Error al cargar datos. Intenta nuevamente.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Comparar ahora';
    }
  };

  function renderSummary() {
    var total = comparisonData.length;
    var synced = 0;
    for (var i = 0; i < comparisonData.length; i++) {
      if (comparisonData[i].difference === 0) synced++;
    }
    var diff = total - synced;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('syncedCount').textContent = synced;
    document.getElementById('diffCount').textContent = diff;
    document.getElementById('btnSyncAll').disabled = diff === 0;
  }

  function getStatusDot(item) {
    var absDiff = Math.abs(item.difference || 0);
    if (absDiff === 0) return '<span class="dot dot-green"></span> Igual';
    if (absDiff <= 5) return '<span class="dot dot-amber"></span> Leve';
    return '<span class="dot dot-red dot-pulse"></span> Cr\u00edtico';
  }

  function getDiffClass(diff) {
    if (diff === 0) return 'diff-zero';
    return diff > 0 ? 'diff-pos' : 'diff-neg';
  }

  function renderTable() {
    tbody.innerHTML = '';
    if (comparisonData.length === 0) {
      emptyState.textContent = 'No se encontraron productos para comparar.';
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';

    for (var i = 0; i < comparisonData.length; i++) {
      var item = comparisonData[i];
      var diff = item.difference || 0;
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + escHtml(item.name || item.producto || '--') + '</td>' +
        '<td><code>' + escHtml(item.sku || '--') + '</code></td>' +
        '<td class="mono">' + (item.stock_bsale != null ? item.stock_bsale : '--') + '</td>' +
        '<td class="mono">' + (item.stock_jumpseller != null ? item.stock_jumpseller : '--') + '</td>' +
        '<td class="mono ' + getDiffClass(diff) + '">' + (diff > 0 ? '+' : '') + diff + '</td>' +
        '<td>' + getStatusDot(item) + '</td>' +
        '<td>' + (diff !== 0
          ? '<button class="btn btn-primary btn-sm" onclick="syncOne(this)">Sync</button>'
          : '<span style="color:var(--text-muted);font-size:12px">OK</span>') + '</td>';
      tbody.appendChild(tr);
    }
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Sync one product — writes blocked
  window.syncOne = function(btn) {
    alert('Funci\u00f3n no activa a\u00fan \u2014 escrituras bloqueadas');
  };

  // Sync all — writes blocked
  window.syncAll = function() {
    alert('Funci\u00f3n no activa a\u00fan \u2014 activa WRITE_MODE primero');
  };

  // Send email alert — not active
  window.sendAlert = function() {
    alert('Funci\u00f3n no activa a\u00fan');
  };

  // Auto-refresh every 5 minutes
  setInterval(function() { window.loadComparison(); }, 5 * 60 * 1000);

  // Initial load
  loadComparison();
})();
</script>
</body>
</html>
