<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cargar producto — InfoPet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/style.css"/>
<style>
body { padding-top: 60px; }

.page { max-width: 860px; margin: 0 auto; padding: 36px 24px 64px; }

/* ── Header ── */
.page-header { margin-bottom: 32px; }
.page-header h1 {
  font-size: 28px; font-weight: 700; letter-spacing: -0.03em;
  color: var(--text); margin-bottom: 6px;
}
.page-header p { font-size: 14px; color: var(--text-3); line-height: 1.5; }

/* ── Form card ── */
.form-card {
  background: #fff;
  border: 0.5px solid rgba(0,0,0,0.08);
  border-radius: 16px;
  padding: 28px 24px 24px;
}

/* ── Form grid ── */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 20px;
}
.form-grid .full { grid-column: 1 / -1; }

/* ── Form group ── */
.fg { margin-bottom: 16px; }
.fg-label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #6E6E73;
  margin-bottom: 6px;
}
.fg-input {
  width: 100%;
  padding: 11px 14px;
  background: #F0F0F2;
  border: 0.5px solid rgba(0,0,0,0.08);
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.fg-input:focus {
  outline: none;
  border-color: #2D6A4F;
  box-shadow: 0 0 0 3px rgba(45,106,79,0.10);
}
.fg-input::placeholder { color: #A1A1A6; }
textarea.fg-input { resize: vertical; min-height: 88px; line-height: 1.5; }
select.fg-input { cursor: pointer; }

/* ── Validation ── */
.fg-input.invalid {
  border-color: var(--red);
  box-shadow: 0 0 0 3px var(--red-bg);
}
.fg-error {
  display: none;
  font-size: 11px;
  color: var(--red);
  margin-top: 5px;
  font-weight: 500;
}
.fg-input.invalid ~ .fg-error { display: block; }

/* ── Submit button ── */
.btn-submit {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 14px 24px;
  margin-top: 8px;
  background: #1D1D1F;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.btn-submit:hover { background: #333; }
.btn-submit:active { transform: scale(0.99); }

/* ── Alert ── */
#alert { margin-bottom: 20px; }

/* ── Responsive ── */
@media (max-width: 640px) {
  .page { padding: 24px 16px 48px; }
  .form-card { padding: 20px 16px; }
  .form-grid { grid-template-columns: 1fr; }
  .fg-input { padding: 13px 14px; font-size: 16px; min-height: 48px; }
  select.fg-input { min-height: 48px; }
  .btn-submit { padding: 16px 24px; font-size: 16px; min-height: 52px; }
  .page-header h1 { font-size: 24px; }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <img src="assets/logo.jpeg" alt="InfoPet"/>
    <span>InfoPet</span>
    <span class="badge">panel</span>
  </a>
  <div class="navbar-links">
    <a href="index.html">Inicio</a>
    <a href="carga-producto.html" class="active">Carga</a>
    <a href="facturas.html">Facturas</a>
    <a href="stock-dashboard.html">Stock</a>
    <a href="jumpseller-bulk.html">Bulk</a>
    <a href="sync-stock.html">Sync</a>
  </div>
</nav>

<main class="page">

  <!-- Header -->
  <div class="page-header">
    <h1>Cargar producto</h1>
    <p>Un formulario &rarr; Bsale + Jumpseller + Sheets</p>
  </div>

  <div id="alert" class="alert"></div>

  <!-- Form card -->
  <div class="form-card">
    <form id="formProducto" autocomplete="off" novalidate>
      <div class="form-grid">

        <div class="fg">
          <label class="fg-label">Nombre *</label>
          <input type="text" id="nombre" class="fg-input" required placeholder="Nombre del producto"/>
          <span class="fg-error">Este campo es obligatorio</span>
        </div>
        <div class="fg">
          <label class="fg-label">SKU</label>
          <input type="text" id="sku" class="fg-input" placeholder="autom&aacute;tico"/>
        </div>

        <div class="fg">
          <label class="fg-label">Precio CLP *</label>
          <input type="number" id="precio" class="fg-input" min="0" required placeholder="0"/>
          <span class="fg-error">Este campo es obligatorio</span>
        </div>
        <div class="fg">
          <label class="fg-label">Stock</label>
          <input type="number" id="stock" class="fg-input" min="0" value="0"/>
        </div>

        <div class="fg">
          <label class="fg-label">Categor&iacute;a *</label>
          <input type="text" id="categoria" class="fg-input" required placeholder="Ej: Alimento perro"/>
          <span class="fg-error">Este campo es obligatorio</span>
        </div>
        <div class="fg">
          <label class="fg-label">Marca</label>
          <input type="text" id="marca" class="fg-input" placeholder="Ej: Royal Canin"/>
        </div>

        <div class="fg">
          <label class="fg-label">Variante</label>
          <input type="text" id="variante" class="fg-input" placeholder="Ej: 4 kg, 1 unidad"/>
        </div>
        <div class="fg">
          <label class="fg-label">C&oacute;digo de barra</label>
          <input type="text" id="codigoBarra" class="fg-input" placeholder="EAN / UPC"/>
        </div>

        <div class="fg full">
          <label class="fg-label">Descripci&oacute;n</label>
          <textarea id="descripcion" class="fg-input" placeholder="Descripci&oacute;n para la tienda web"></textarea>
        </div>

        <div class="fg full">
          <label class="fg-label">Clasificaci&oacute;n</label>
          <select id="clasificacion" class="fg-input">
            <option value="Alimento">Alimento</option>
            <option value="Accesorio">Accesorio</option>
            <option value="Higiene">Higiene</option>
            <option value="Salud">Salud</option>
            <option value="Otro">Otro</option>
          </select>
        </div>

      </div>

      <button type="submit" class="btn-submit">Cargar producto &rarr;</button>
    </form>
  </div>

</main>

<script src="auth.js"></script>
<script src="assets/utils.js"></script>
<script>
(function() {
  var form = document.getElementById('formProducto');
  var alertEl = document.getElementById('alert');

  /* Clear validation on input */
  form.querySelectorAll('.fg-input[required]').forEach(function(input) {
    input.addEventListener('input', function() {
      input.classList.remove('invalid');
    });
  });

  /* Form submit */
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    alertEl.classList.remove('visible');

    var required = form.querySelectorAll('.fg-input[required]');
    var hasErrors = false;

    required.forEach(function(input) {
      input.classList.remove('invalid');
      if (!input.value.trim()) {
        hasErrors = true;
        input.classList.add('invalid');
      }
    });

    if (hasErrors) {
      showAlert(alertEl, 'err', 'Completa los campos obligatorios: Nombre, Precio y Categor\u00eda.');
      var first = form.querySelector('.fg-input.invalid');
      if (first) first.focus();
      return;
    }

    alert('Funci\u00f3n no activa a\u00fan \u2014 escrituras bloqueadas (WRITE_MODE desactivado)');
  });
})();
</script>
</body>
</html>
