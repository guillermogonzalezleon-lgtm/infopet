<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cargar producto — Infopet</title>
<link rel="stylesheet" href="assets/style.css"/>
<style>
  .page { max-width: 860px; margin: 0 auto; padding: 32px 24px; }

  .page-header { margin-bottom: 32px; }
  .page-header h1 { margin-bottom: 4px; }
  .page-header p { color: var(--text-muted); font-size: 14px; }

  /* ── Stepper ── */
  .stepper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 32px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
    transition: color 0.3s var(--ease);
  }
  .step-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    border: 2px solid var(--border);
    color: var(--text-muted);
    background: var(--surface);
    transition: all 0.3s var(--ease);
  }
  .step.active .step-circle {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .step.active { color: var(--text); }
  .step.done .step-circle {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .step-line {
    width: 48px;
    height: 2px;
    background: var(--border);
    margin: 0 12px;
    transition: background 0.3s var(--ease);
  }
  .step-line.done { background: var(--green); }

  /* ── Form grid ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 20px;
  }
  .form-grid .full { grid-column: 1 / -1; }
  .form-input::placeholder { color: var(--text-light); }
  textarea.form-input { resize: vertical; min-height: 80px; }

  .btn-submit {
    margin-top: 12px;
    width: 100%;
    justify-content: center;
    font-size: 15px;
    padding: 14px 24px;
  }

  /* ── Progress ── */
  .progress-wrap { display: none; margin-bottom: 16px; }
  .progress-wrap.visible { display: block; }

  /* ── Result pills ── */
  .result-summary {
    display: none;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .result-summary.visible { display: flex; }
  .result-pill {
    font-size: 13px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 100px;
    letter-spacing: 0.01em;
  }
  .result-ok { background: var(--green-bg); color: var(--green); }
  .result-err { background: var(--red-bg); color: var(--red); }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .page { padding: 20px 16px; }
    .stepper { gap: 0; }
    .step span:not(.step-circle) { display: none; }
    .step-line { width: 32px; margin: 0 6px; }
  }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <img src="assets/logo.jpeg" alt="InfoPet"/>
    <span>InfoPet</span>
    <span class="badge">panel</span>
  </a>
  <div class="navbar-links">
    <a href="index.html">Inicio</a>
    <a href="carga-producto.html" class="active">Carga</a>
    <a href="facturas.html">Facturas</a>
    <a href="stock-dashboard.html">Stock</a>
    <a href="jumpseller-bulk.html">Bulk</a>
    <a href="sync-stock.html">Sync</a>
  </div>
</nav>

<main class="page">

  <!-- Header -->
  <div class="page-header">
    <h1>Cargar producto</h1>
    <p>Un formulario &rarr; Bsale + Jumpseller + Sheets en paralelo</p>
  </div>

  <!-- Stepper -->
  <div class="stepper" id="stepper">
    <div class="step active" data-step="1">
      <span class="step-circle">1</span>
      <span>Datos</span>
    </div>
    <div class="step-line" data-line="1"></div>
    <div class="step" data-step="2">
      <span class="step-circle">2</span>
      <span>Revisi&oacute;n</span>
    </div>
    <div class="step-line" data-line="2"></div>
    <div class="step" data-step="3">
      <span class="step-circle">3</span>
      <span>Resultado</span>
    </div>
  </div>

  <div id="alert" class="alert"></div>

  <div class="result-summary" id="summary"></div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <div class="card" id="formCard">
    <form id="formProducto" autocomplete="off">
      <div class="form-grid">

        <div class="form-group">
          <label class="form-label">Nombre *</label>
          <input type="text" id="nombre" class="form-input" required/>
        </div>
        <div class="form-group">
          <label class="form-label">SKU</label>
          <input type="text" id="sku" class="form-input" placeholder="Se genera autom&aacute;ticamente"/>
        </div>

        <div class="form-group">
          <label class="form-label">Precio CLP *</label>
          <input type="number" id="precio" class="form-input" min="0" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Stock</label>
          <input type="number" id="stock" class="form-input" min="0" value="0"/>
        </div>

        <div class="form-group">
          <label class="form-label">Categor&iacute;a *</label>
          <input type="text" id="categoria" class="form-input" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Marca</label>
          <input type="text" id="marca" class="form-input"/>
        </div>

        <div class="form-group">
          <label class="form-label">Variante</label>
          <input type="text" id="variante" class="form-input" placeholder="Ej: 4 kg, 1 unidad"/>
        </div>
        <div class="form-group">
          <label class="form-label">C&oacute;digo de barra EAN</label>
          <input type="text" id="codigoBarra" class="form-input"/>
        </div>

        <div class="form-group full">
          <label class="form-label">Descripci&oacute;n web</label>
          <textarea id="descripcion" class="form-input"></textarea>
        </div>

        <div class="form-group full">
          <label class="form-label">Clasificaci&oacute;n</label>
          <select id="clasificacion" class="form-input">
            <option value="Alimento">Alimento</option>
            <option value="Accesorio">Accesorio</option>
            <option value="Higiene">Higiene</option>
            <option value="Salud">Salud</option>
            <option value="Otro">Otro</option>
          </select>
        </div>

      </div>

      <button type="submit" class="btn btn-primary btn-submit">Cargar producto &rarr;</button>
    </form>
  </div>

</main>

<script src="auth.js"></script>
<script src="assets/utils.js"></script>
<script>
(function() {
  const form = document.getElementById('formProducto');
  const alertEl = document.getElementById('alert');
  const summaryEl = document.getElementById('summary');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');

  /* ── Stepper helpers ── */
  function setStep(n) {
    document.querySelectorAll('.step').forEach(s => {
      const sn = Number(s.dataset.step);
      s.classList.remove('active', 'done');
      if (sn < n) s.classList.add('done');
      if (sn === n) s.classList.add('active');
    });
    document.querySelectorAll('.step-line').forEach(l => {
      const ln = Number(l.dataset.line);
      l.classList.toggle('done', ln < n);
    });
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Limpiar estado previo
    summaryEl.classList.remove('visible');
    summaryEl.innerHTML = '';
    alertEl.classList.remove('visible');

    // Leer campos
    const nombre = document.getElementById('nombre').value.trim();
    const skuVal = document.getElementById('sku').value.trim();
    const precio = Number(document.getElementById('precio').value);
    const stock = Number(document.getElementById('stock').value) || 0;
    const categoria = document.getElementById('categoria').value.trim();
    const marca = document.getElementById('marca').value.trim();
    const variante = document.getElementById('variante').value.trim();
    const codigoBarra = document.getElementById('codigoBarra').value.trim();
    const descripcion = document.getElementById('descripcion').value.trim();
    const clasificacion = document.getElementById('clasificacion').value;

    // Validar obligatorios
    if (!nombre || !precio || !categoria) {
      return showAlert(alertEl, 'err', 'Completa los campos obligatorios: Nombre, Precio y Categor\u00eda.');
    }

    const sku = skuVal || autoSKU(nombre);

    // Step 2: Revision
    setStep(2);
    progressWrap.classList.add('visible');
    progressBar.style.width = '0%';

    const tasks = [
      {
        name: 'Bsale',
        fn: () => apiFetch('/api/bsale?endpoint=products.json', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: nombre,
            description: descripcion,
            classificationsId: categoria,
            variant: {
              description: variante || nombre,
              barCode: codigoBarra,
              code: sku,
              price: precio,
              stock: stock
            }
          })
        })
      },
      {
        name: 'Jumpseller',
        fn: () => apiFetch('/api/jumpseller?endpoint=products.json', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            product: {
              name: nombre,
              price: precio,
              stock: stock,
              sku: sku,
              description: descripcion,
              brand: marca,
              category: categoria
            }
          })
        })
      },
      {
        name: 'Sheets',
        fn: () => apiFetch('/api/sheets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            values: [clasificacion, categoria, nombre, variante, marca, 0, codigoBarra, sku, 0, precio]
          })
        })
      }
    ];

    const results = await parallelTasks(tasks, ({ done, total }) => {
      progressBar.style.width = Math.round((done / total) * 100) + '%';
    });

    // Ocultar progreso
    progressWrap.classList.remove('visible');

    // Step 3: Resultado
    setStep(3);

    let allOk = true;
    for (const [name, r] of Object.entries(results)) {
      const ok = r.status === 'ok';
      if (!ok) allOk = false;
      const span = document.createElement('span');
      span.className = 'result-pill ' + (ok ? 'result-ok' : 'result-err');
      span.textContent = (ok ? '\u2713 ' : '\u2717 ') + name;
      if (!ok) span.title = r.error;
      summaryEl.appendChild(span);
    }
    summaryEl.classList.add('visible');

    if (allOk) {
      showAlert(alertEl, 'ok', 'Producto cargado correctamente en los 3 canales.');
      form.reset();
      document.getElementById('stock').value = '0';
    } else {
      showAlert(alertEl, 'warn', 'Algunas cargas fallaron. Revisa el resumen.');
    }
  });
})();
</script>
</body>
</html>
