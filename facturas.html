<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Facturas — InfoPet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/style.css"/>
<style>
body { padding-top: 52px; }

.page { max-width: 960px; margin: 0 auto; padding: 36px 24px 64px; }

/* ── Header ── */
.page-header { margin-bottom: 28px; }
.page-header h1 {
  font-size: 28px; font-weight: 700; letter-spacing: -0.03em;
  color: var(--text); margin-bottom: 6px;
}
.page-header p { font-size: 14px; color: var(--text-3); }

/* ── Pill tabs ── */
.pill-tabs {
  display: inline-flex;
  background: #F0F0F2;
  border-radius: 12px;
  padding: 3px;
  margin-bottom: 28px;
}
.pill-tab {
  padding: 10px 24px;
  border: none;
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  background: transparent;
  color: #6E6E73;
  transition: all 0.2s var(--ease);
  white-space: nowrap;
}
.pill-tab:hover { color: var(--text); }
.pill-tab.active {
  background: #1D1D1F;
  color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

/* ── Tab panels ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeUp 0.3s var(--ease); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── White card ── */
.w-card {
  background: #fff;
  border: 0.5px solid rgba(0,0,0,0.08);
  border-radius: 16px;
  padding: 24px;
}
.w-card + .w-card { margin-top: 16px; }

/* ── Search bar ── */
.search-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.search-row .s-input {
  flex: 1;
  padding: 11px 14px;
  background: #F0F0F2;
  border: 0.5px solid rgba(0,0,0,0.08);
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-row .s-input:focus {
  outline: none;
  border-color: #2D6A4F;
  box-shadow: 0 0 0 3px rgba(45,106,79,0.10);
}
.search-row .s-input::placeholder { color: #A1A1A6; }

/* ── Buttons ── */
.btn-dark {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 11px 20px;
  background: #1D1D1F;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-dark:hover { background: #333; }
.btn-dark:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 16px;
  background: transparent;
  color: var(--text-3);
  border: 0.5px solid rgba(0,0,0,0.08);
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-ghost:hover { background: rgba(0,0,0,0.03); color: var(--text); }

/* ── Spinner inline ── */
.spin-row {
  display: none;
  align-items: center;
  gap: 10px;
  color: var(--text-3);
  font-size: 13px;
  padding: 8px 0;
}
.spin-row.show { display: flex; }
.spin-row::before {
  content: '';
  width: 18px; height: 18px;
  border: 2px solid rgba(0,0,0,0.08);
  border-top-color: #2D6A4F;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Table ── */
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -24px; padding: 0 24px; }
.tbl {
  width: 100%; border-collapse: collapse; font-size: 13px;
  min-width: 580px;
}
.tbl th {
  text-align: left;
  padding: 10px 14px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #6E6E73;
  border-bottom: 0.5px solid rgba(0,0,0,0.08);
  background: #FAFAFA;
}
.tbl td {
  padding: 10px 14px;
  border-bottom: 0.5px solid rgba(0,0,0,0.04);
  color: var(--text);
  vertical-align: middle;
}
.tbl tbody tr:last-child td { border-bottom: none; }
.tbl tbody tr:hover td { background: rgba(0,0,0,0.015); }

/* ── Status badges ── */
.badge-ok { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; background: var(--green-bg); color: var(--green); }
.badge-grey { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; background: #F0F0F2; color: #6E6E73; }

/* ── Detail expand ── */
.detail-row td { padding: 16px; background: #FAFAFA; }
.detail-products { display: grid; gap: 6px; font-size: 13px; }
.detail-line {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 14px; background: #fff; border-radius: 8px;
  border: 0.5px solid rgba(0,0,0,0.04);
}
.detail-line .dl-price { font-variant-numeric: tabular-nums; color: var(--text-2); }

/* ── Dropzone ── */
.dropzone {
  border: 2px dashed rgba(0,0,0,0.12);
  border-radius: 16px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  background: #FAFAFA;
}
.dropzone:hover, .dropzone.dragover {
  border-color: #2D6A4F;
  background: rgba(45,106,79,0.03);
}
.dz-icon {
  width: 56px; height: 56px; margin: 0 auto 16px;
  border-radius: 14px;
  background: rgba(45,106,79,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: #2D6A4F;
}
.dz-text { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.dz-hint { font-size: 13px; color: #A1A1A6; }
.dropzone input[type=file] { display: none; }

/* ── Image preview ── */
.img-preview {
  max-width: 100%; max-height: 320px;
  border-radius: 12px; margin-top: 16px;
  display: none; border: 0.5px solid rgba(0,0,0,0.08);
}

/* ── Action row ── */
.action-row {
  display: flex; align-items: center; gap: 10px;
  margin-top: 20px; flex-wrap: wrap;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .page { padding: 24px 16px 48px; }
  .w-card { padding: 20px 16px; }
  .pill-tabs { display: flex; width: 100%; }
  .pill-tab { flex: 1; text-align: center; padding: 11px 12px; font-size: 13px; }
  .search-row { flex-direction: column; }
  .search-row .s-input { font-size: 16px; padding: 13px 14px; min-height: 48px; }
  .btn-dark { width: 100%; justify-content: center; min-height: 48px; font-size: 15px; }
  .dropzone { padding: 56px 20px; }
  .tbl-wrap { margin: 0 -16px; padding: 0 16px; }
  .page-header h1 { font-size: 24px; }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <img src="assets/logo.jpeg" alt="InfoPet"/>
    <span>InfoPet</span>
    <span class="badge">panel</span>
  </a>
  <div class="navbar-links">
    <a href="index.html">Inicio</a>
    <a href="carga-producto.html">Carga</a>
    <a href="facturas.html" class="active">Facturas</a>
    <a href="stock-dashboard.html">Stock</a>
    <a href="jumpseller-bulk.html">Bulk</a>
    <a href="sync-stock.html">Sync</a>
  </div>
</nav>

<main class="page">

  <!-- Header -->
  <div class="page-header">
    <h1>Facturas</h1>
    <p>Facturas digitales de Bsale + OCR de facturas f&iacute;sicas</p>
  </div>

  <!-- Pill tabs -->
  <div class="pill-tabs">
    <button class="pill-tab active" data-tab="digital">Digital (Bsale)</button>
    <button class="pill-tab" data-tab="fisica">F&iacute;sica (foto)</button>
  </div>

  <!-- ═══════════════════════════════
       TAB 1 — Digital (Bsale)
       ═══════════════════════════════ -->
  <div id="tab-digital" class="tab-panel active">
    <div class="w-card">
      <div class="search-row">
        <input type="text" id="bsale-query" class="s-input" placeholder="Buscar por N&deg; factura o RUT"/>
        <button class="btn-dark" id="btn-buscar-bsale">Buscar en Bsale</button>
      </div>
      <div id="bsale-alert" class="alert"></div>
      <div id="bsale-spinner" class="spin-row">Buscando en Bsale...</div>
    </div>

    <div class="w-card" id="bsale-results" style="display:none">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th>N&deg;</th>
              <th>Fecha</th>
              <th>Proveedor</th>
              <th>Total</th>
              <th>Estado</th>
              <th>Acci&oacute;n</th>
            </tr>
          </thead>
          <tbody id="bsale-tbody"></tbody>
        </table>
      </div>

      <div class="action-row">
        <button class="btn-dark" id="btn-cargar-bsale">Cargar productos</button>
      </div>
      <div id="bsale-cargar-alert" class="alert" style="margin-top:12px"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════
       TAB 2 — Fisica (foto + OCR)
       ═══════════════════════════════ -->
  <div id="tab-fisica" class="tab-panel">

    <!-- Upload -->
    <div class="w-card">
      <div class="dropzone" id="dropzone">
        <div class="dz-icon">&#128247;</div>
        <div class="dz-text">Arrastra la foto aqu&iacute; o haz clic para seleccionar</div>
        <div class="dz-hint">Formatos: JPG, PNG, HEIC</div>
        <input type="file" id="file-input" accept="image/*"/>
      </div>
      <img id="img-preview" class="img-preview" alt="Preview"/>
      <div class="action-row">
        <button class="btn-dark" id="btn-ocr" disabled>Procesar con OCR</button>
      </div>
      <div id="ocr-alert" class="alert" style="margin-top:12px"></div>
    </div>

    <!-- OCR Results (hidden until processed) -->
    <div class="w-card" id="ocr-results" style="display:none">
      <h3 style="margin-bottom:16px;font-size:17px;font-weight:600">Datos extra&iacute;dos</h3>
      <div class="action-row" style="margin-top:0">
        <button class="btn-dark" id="btn-confirmar">Confirmar y cargar</button>
      </div>
      <div id="confirm-alert" class="alert" style="margin-top:12px"></div>
    </div>
  </div>

</main>

<script src="auth.js"></script>
<script src="assets/utils.js"></script>
<script>
/* ══════════════════════════════════════
   Tabs
   ══════════════════════════════════════ */
document.querySelectorAll('.pill-tab').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.pill-tab').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

/* ══════════════════════════════════════
   TAB 1 — Factura digital (Bsale)
   ══════════════════════════════════════ */
var bsaleQuery = document.getElementById('bsale-query');
var bsaleAlert = document.getElementById('bsale-alert');
var bsaleSpinner = document.getElementById('bsale-spinner');
var bsaleResults = document.getElementById('bsale-results');
var bsaleTbody = document.getElementById('bsale-tbody');
var bsaleCargarAlert = document.getElementById('bsale-cargar-alert');

var bsaleDocs = [];
var bsaleDetailItems = {};

bsaleQuery.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('btn-buscar-bsale').click();
});

document.getElementById('btn-buscar-bsale').addEventListener('click', async function() {
  var q = bsaleQuery.value.trim();
  if (!q) { showAlert(bsaleAlert, 'err', 'Ingresa un n\u00famero de factura o RUT'); return; }

  bsaleAlert.classList.remove('visible');
  bsaleSpinner.classList.add('show');
  bsaleResults.style.display = 'none';
  bsaleDocs = [];
  bsaleDetailItems = {};

  try {
    var res = await fetch('/api/bsale?endpoint=documents.json&number=' + encodeURIComponent(q));
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error de Bsale');

    var docs = data.items || [];
    if (docs.length === 0) {
      showAlert(bsaleAlert, 'err', 'No se encontraron documentos para "' + q + '"');
      bsaleSpinner.classList.remove('show');
      return;
    }

    bsaleDocs = docs;
    bsaleTbody.innerHTML = '';

    docs.forEach(function(doc, i) {
      var date = doc.generationDate ? new Date(doc.generationDate * 1000).toLocaleDateString('es-CL') : '-';
      var total = doc.totalAmount || doc.netAmount || 0;
      var hasUrl = !!doc.urlPdf;

      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + (doc.number || '-') + '</td>' +
        '<td>' + date + '</td>' +
        '<td>' + (doc.client && (doc.client.company || doc.client.firstName) || '-') + '</td>' +
        '<td style="font-variant-numeric:tabular-nums">' + fmt(total) + '</td>' +
        '<td><span class="' + (hasUrl ? 'badge-ok' : 'badge-grey') + '">' + (hasUrl ? 'Digital' : 'No disponible') + '</span></td>' +
        '<td><button class="btn-ghost" data-doc="' + i + '">Ver detalle</button></td>';
      bsaleTbody.appendChild(tr);
    });

    bsaleResults.style.display = 'block';
    showAlert(bsaleAlert, 'ok', docs.length + ' documento(s) encontrado(s)');
  } catch (err) {
    showAlert(bsaleAlert, 'err', err.message);
  } finally {
    bsaleSpinner.classList.remove('show');
  }
});

/* Ver detalle: expand row */
bsaleTbody.addEventListener('click', async function(e) {
  var btn = e.target.closest('[data-doc]');
  if (!btn) return;
  var idx = Number(btn.dataset.doc);
  var doc = bsaleDocs[idx];
  var parentTr = btn.closest('tr');

  var existing = parentTr.nextElementSibling;
  if (existing && existing.classList.contains('detail-row')) {
    existing.remove();
    return;
  }

  if (!bsaleDetailItems[idx]) {
    btn.disabled = true;
    btn.textContent = 'Cargando...';
    try {
      var detailUrl = doc.details && doc.details.href;
      if (detailUrl) {
        var endpoint = detailUrl.replace('https://api.bsale.cl/v1/', '');
        var detRes = await fetch('/api/bsale?endpoint=' + encodeURIComponent(endpoint));
        var detData = await detRes.json();
        bsaleDetailItems[idx] = (detData.items || []).map(function(d) {
          return {
            nombre: (d.variant && d.variant.description) || d.description || '',
            cantidad: d.quantity || 0,
            total: d.totalAmount || 0
          };
        });
      } else {
        bsaleDetailItems[idx] = [];
      }
    } catch (err) {
      showAlert(bsaleAlert, 'err', 'Error cargando detalle: ' + err.message);
      btn.disabled = false;
      btn.textContent = 'Ver detalle';
      return;
    }
    btn.disabled = false;
    btn.textContent = 'Ver detalle';
  }

  var items = bsaleDetailItems[idx] || [];
  var detailTr = document.createElement('tr');
  detailTr.className = 'detail-row';
  var linesHtml = items.length > 0
    ? items.map(function(it) { return '<div class="detail-line"><span>' + it.nombre + ' (x' + it.cantidad + ')</span><span class="dl-price">' + fmt(it.total) + '</span></div>'; }).join('')
    : '<div style="color:#6E6E73;font-size:13px;padding:8px 0">Sin l\u00edneas de detalle</div>';
  detailTr.innerHTML = '<td colspan="6"><div class="detail-products">' + linesHtml + '</div></td>';
  parentTr.after(detailTr);
});

/* Cargar productos — bloqueado */
document.getElementById('btn-cargar-bsale').addEventListener('click', function() {
  alert('Funci\u00f3n no activa a\u00fan \u2014 escrituras bloqueadas');
});

/* ══════════════════════════════════════
   TAB 2 — Factura fisica (foto + OCR)
   ══════════════════════════════════════ */
var dropzone = document.getElementById('dropzone');
var fileInput = document.getElementById('file-input');
var imgPreview = document.getElementById('img-preview');
var btnOcr = document.getElementById('btn-ocr');
var ocrAlert = document.getElementById('ocr-alert');

var uploadedFile = null;

dropzone.addEventListener('click', function() { fileInput.click(); });
dropzone.addEventListener('dragover', function(e) { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', function() { dropzone.classList.remove('dragover'); });
dropzone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', function() {
  if (fileInput.files.length) handleFile(fileInput.files[0]);
});

function handleFile(file) {
  if (!file.type.startsWith('image/')) {
    showAlert(ocrAlert, 'err', 'Solo se aceptan im\u00e1genes');
    return;
  }
  uploadedFile = file;
  var reader = new FileReader();
  reader.onload = function(e) {
    imgPreview.src = e.target.result;
    imgPreview.style.display = 'block';
    btnOcr.disabled = false;
  };
  reader.readAsDataURL(file);
}

btnOcr.addEventListener('click', function() {
  alert('Funci\u00f3n no activa a\u00fan \u2014 carga cr\u00e9ditos Claude API');
});

document.getElementById('btn-confirmar').addEventListener('click', function() {
  alert('Funci\u00f3n no activa a\u00fan \u2014 escrituras bloqueadas');
});
</script>
</body>
</html>
